[package]
name = "everlasting"
version = "0.1.0"
description = "Everlasting - Vibe Coding Workbench"
authors = ["Carlos"]
edition = "2021"

[lib]
name = "everlasting_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-dialog = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# LLM client
reqwest = { version = "0.13", features = ["stream", "json", "rustls"], default-features = false }
futures-util = "0.3"
tokio = { version = "1", features = ["sync", "rt-multi-thread", "macros", "time", "process", "fs"] }
tokio-util = { version = "0.7", features = ["io", "rt"] }
async-stream = "0.3"
anyhow = "1"
thiserror = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Persistence (step 3a)
sqlx = { version = "0.8", default-features = false, features = ["runtime-tokio", "sqlite", "macros", "chrono"] }
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
tauri-plugin-os = "2.3.2"

# Tooling (toolset extension: edit_file / grep / glob / list_dir)
globset = "0.4"
xxhash-rust = { version = "0.8", features = ["xxh64"] }

# Step 4: Git worktree isolation
# `vendored-libgit2` pulls a C libgit2 build into the binary, so the
# runtime doesn't depend on a system-installed `libgit2`. First build
# pays ~30-90s compiling the C source; subsequent builds use cargo's
# incremental cache and sccache if configured.
git2 = { version = "0.20", default-features = false, features = ["vendored-libgit2"] }

[dev-dependencies]
tempfile = "3"

[profile.dev]
incremental = true

[profile.release]
codegen-units = 1
lto = true
opt-level = "s"
panic = "abort"
strip = true
